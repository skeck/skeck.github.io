# Site configuration

theme: jekyll-theme-chirpy

lang: en
timezone: Europe/Berlin

title: Stefan Keck
tagline: Practical notes on Business Central, AL and DevOps

description: >-
  Practical notes on Microsoft Business Central, AL development,
  Azure infrastructure and engineering workflows.

url: "https://skeck.github.io"
baseurl: ""

github:
  username: skeck

social:
  name: Stefan Keck
  email:
  links:
    - https://github.com/skeck
    - https://www.linkedin.com/in/stefan-keck

# Follow the visitor's system preference by default.
theme_mode:

avatar: assets/img/ava.png
social_preview_image: /assets/img/social-preview.png

toc: true

comments:
  provider:

assets:
  self_host:
    enabled:
    env:

pwa:
  enabled: true
  cache:
    enabled: true
    deny_paths:

paginate: 10

kramdown:
  footnote_backlink: "&#8617;&#xfe0e;"
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1

collections:
  tabs:
    output: true
    sort_by: order

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: true
      toc: true
      permalink: /posts/:title/
  - scope:
      path: _drafts
    values:
      comments: false
  - scope:
      path: ""
      type: tabs
    values:
      layout: page
      permalink: /:title/

sass:
  style: compressed

compress_html:
  clippings: all
  comments: all
  endings: all
  profile: false
  blanklines: false
  ignore:
    envs: [development]

exclude:
  - "*.gem"
  - "*.gemspec"
  - docs
  - tools
  - README.md
  - LICENSE
  - purgecss.js
  - "*.config.js"
  - "package*.json"

jekyll-archives:
  enabled: [categories, tags]
  layouts:
    category: category
    tag: tag
  permalinks:
    tag: /tags/:name/
    category: /categories/:name/
